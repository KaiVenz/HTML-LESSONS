<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project FutureCon</title>
</head>
<body style="font-family: 'Franklin Gothic Medium';">
    
    <h1>FutureCon 2026 Registration</h1>

    <fieldset>
    <legend>Attendee Details</legend>

  <form action="successful.html">

    
        <label for="FName"> First Name: </label> <br>
        <input type="text" id="fname" name="fname" placeholder="Enter your first name">
        <br>
    
        <label for="LName"> Last Name: </label> <br>
        <input type="text" id="lname" name="lname" placeholder="Enter your last name">
        <br>
    
        <label for="UEmail"> Email Address: </label> <br>
        <input type="email" id="uemail" name="umail" placeholder="useremail@example.com">
        <br>
        
         <label for="Upwd"> Password: </label> <br>
        <input type="password" id="upwd" name="upwd" placeholder="Enter a password">
        <br>

  </fieldset>

   <fieldset>
    <legend>Ticket Tiers(Single Choice)</legend>
  <form action="successful.html">

    <label for="UTicketTier"> Ticket Tier: </label> <br>
        <input type="radio" id="utickettier" name="utickettier">
        <label> VIP Access </label>
        <input type="radio" id="utickettier" name="utickettier">
        <label> Speaker/Press </label>
        <br>
    </fieldset>

    <fieldset>
    <legend>Workshop Customization(Multiple Choice)</legend>
  <form action="successful.html">
    <label for="UWorkshop"> Workshop of Interest: </label> <br>
        <input type="checkbox" id="uworkshop" name="uworkshop">
        <label> Web3 and the Future </label>
        <input type="checkbox" id="uworkshop" name="uworkshop">
        <label> Cybersecurity Protocols </label>
        <input type="checkbox" id="uworkshop" name="uworkshop">
        <label> Game Design Masterclass </label>
        <br>
    </fieldset>

     <fieldset>
    <legend>Event Logistics</legend>
  <form action="successful.html">
    <label for="ULanyard"> Choose your Lanyard Color: </label> <br>
        <input type="color" id="ulanyard" name="ulanyard">
        <br>
        
        <label for="UDate"> Expected Date of Arrival: </label> <br>
        <input type="date" id="udate" name="udate">
        <br>

        <input type="submit" value="Secure My Ticket" >
    </fieldset>

</body>
</html>
